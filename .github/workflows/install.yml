name: Install NixOS (DESTRUCTIVE — wipes the VPS disk)

on:
  workflow_dispatch:
    inputs:
      confirm_vps_ip:
        description: "Type your VPS IP exactly to confirm disk wipe (must match VPS_IP secret)"
        required: true
        type: string

jobs:
  install:
    name: nixos-anywhere
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Confirm disk-wipe target
        env:
          CONFIRM: ${{ inputs.confirm_vps_ip }}
          EXPECTED: ${{ secrets.VPS_IP }}
        run: |
          if [ -z "$EXPECTED" ]; then
            echo "::error::VPS_IP secret is not set."
            exit 1
          fi
          if [ "$CONFIRM" != "$EXPECTED" ]; then
            echo "::error::Confirmation '$CONFIRM' does not match VPS_IP secret. Aborting."
            exit 1
          fi
          echo "Confirmed. Target: $EXPECTED"

      - name: Install Nix
        uses: cachix/install-nix-action@v27
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true

      - name: Generate config.local.nix from secrets
        env:
          HOSTNAME:        ${{ secrets.HOSTNAME }}
          USERNAME:        ${{ secrets.USERNAME }}
          DOMAIN:          ${{ secrets.DOMAIN }}
          ACME_EMAIL:      ${{ secrets.ACME_EMAIL }}
          TAILNET:         ${{ secrets.TAILNET }}
          USER_SSH_PUBKEY: ${{ secrets.USER_SSH_PUBKEY }}
        run: |
          set -eu
          for var in HOSTNAME USERNAME DOMAIN ACME_EMAIL TAILNET USER_SSH_PUBKEY; do
            if [ -z "${!var}" ]; then
              echo "::error::Required secret $var is not set."
              exit 1
            fi
          done
          # Nix string interpolation/escape: backslash and double-quote only.
          esc() { printf '%s' "$1" | sed -e 's/\\/\\\\/g' -e 's/"/\\"/g'; }
          cat > config.local.nix <<EOF
          {
            hostname     = "$(esc "$HOSTNAME")";
            username     = "$(esc "$USERNAME")";
            domain       = "$(esc "$DOMAIN")";
            acmeEmail    = "$(esc "$ACME_EMAIL")";
            tailnet      = "$(esc "$TAILNET")";
            sshPublicKey = "$(esc "$USER_SSH_PUBKEY")";
          }
          EOF
          chmod 600 config.local.nix
          # Flakes only evaluate files known to git. Force-add and commit the
          # (gitignored) local config so the flake can read it. This commit
          # lives only on the runner — it is never pushed to the remote.
          git config user.email "actions@github.local"
          git config user.name  "github-actions"
          git add -f config.local.nix
          git commit -m "[runner only] inject secrets via config.local.nix"

      - name: Validate VPS_ROOT_PASSWORD secret
        env:
          PW: ${{ secrets.VPS_ROOT_PASSWORD }}
        run: |
          if [ -z "$PW" ]; then
            echo "::error::VPS_ROOT_PASSWORD secret is not set. Copy the root password from your Contabo welcome email."
            exit 1
          fi

      - name: Install sshpass
        run: sudo apt-get update -qq && sudo apt-get install -y -qq sshpass

      - name: Pre-seed known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "${{ secrets.VPS_IP }}" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Write Tailscale auth key for first-boot autoconnect
        env:
          AUTHKEY: ${{ secrets.TAILSCALE_AUTHKEY }}
        run: |
          if [ -z "$AUTHKEY" ]; then
            echo "::error::TAILSCALE_AUTHKEY secret is not set."
            exit 1
          fi
          mkdir -p extra-files/var/lib
          umask 077
          printf '%s' "$AUTHKEY" > extra-files/var/lib/tailscale-authkey
          chmod 400 extra-files/var/lib/tailscale-authkey

      - name: Run nixos-anywhere
        env:
          # nixos-anywhere --env-password reads SSHPASS from env and uses sshpass
          # internally for the initial root SSH connection.
          SSHPASS: ${{ secrets.VPS_ROOT_PASSWORD }}
        run: |
          nix run github:nix-community/nixos-anywhere -- \
            --flake .#default \
            --extra-files extra-files \
            --env-password \
            --ssh-option "StrictHostKeyChecking=accept-new" \
            root@${{ secrets.VPS_IP }}

      - name: Done
        run: |
          echo "Install complete. Server will reboot and auto-join Tailscale."
          echo "Verify on your laptop: tailscale status | grep <hostname>"
          echo ""
          echo "Next: copy /etc/nixos/hardware-configuration.nix from the server"
          echo "to hosts/server/hardware-configuration.nix in your repo, commit and push."
          echo "See README §'Sync hardware-configuration.nix' for the exact command."
